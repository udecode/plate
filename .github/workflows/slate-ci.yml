name: Slate CI

on:
  push:
    branches:
      - main
      - next
    paths:
      - 'packages/browser/**'
      - 'packages/slate/**'
      - 'packages/slate-dom/**'
      - 'packages/slate-history/**'
      - 'packages/slate-hyperscript/**'
      - 'packages/slate-layout/**'
      - 'packages/slate-react/**'
      - 'packages/yjs/**'
      - 'apps/slate/**'
      - 'apps/www/src/app/(app)/examples/slate/**'
      - 'apps/slate/tests/slate-browser/**'
      - 'content/docs/slate/**'
      - 'tooling/scripts/bench-targets.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/actions/pnpm-install/**'
      - '.github/workflows/slate-ci.yml'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'packages/browser/**'
      - 'packages/slate/**'
      - 'packages/slate-dom/**'
      - 'packages/slate-history/**'
      - 'packages/slate-hyperscript/**'
      - 'packages/slate-layout/**'
      - 'packages/slate-react/**'
      - 'packages/yjs/**'
      - 'apps/slate/**'
      - 'apps/www/src/app/(app)/examples/slate/**'
      - 'apps/slate/tests/slate-browser/**'
      - 'content/docs/slate/**'
      - 'tooling/scripts/bench-targets.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/actions/pnpm-install/**'
      - '.github/workflows/slate-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  packages:
    name: Slate packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Monorepo install
        uses: ./.github/actions/pnpm-install

      - name: Typecheck packages
        run: pnpm slate:typecheck

      - name: Test packages
        run: pnpm slate:test

      - name: Test browser package
        run: pnpm slate:browser:test

  browser-chromium:
    name: Slate browser chromium
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_RETRIES: 2
      PLAYWRIGHT_WORKERS: 6

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Monorepo install
        uses: ./.github/actions/pnpm-install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Chromium
        run: pnpm --filter slate exec playwright install --with-deps chromium

      - name: Run Chromium browser proof
        run: pnpm --filter slate test:slate-browser:chromium

  browser-matrix:
    name: Slate browser matrix
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    env:
      PLAYWRIGHT_RETRIES: 2
      PLAYWRIGHT_WORKERS: 6

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Monorepo install
        uses: ./.github/actions/pnpm-install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm --filter slate exec playwright install --with-deps chromium firefox

      - name: Run browser matrix
        run: pnpm --filter slate test:slate-browser
