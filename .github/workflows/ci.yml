name: CI

on:
  push:
    branches:
      - main
      - next
    paths:
      - 'packages/**'
      - 'tooling/**'
      - 'package.json'
      - '.github/actions/**'
      - '.github/workflows/lint-typecheck.yml'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'biome.jsonc'
      - 'eslint*'
      - 'bunfig.toml'
      - 'tsconfig.json'
      - 'turbo.json'
      - 'config'
      - 'scripts'
      - 'patches'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'packages/**'
      - 'tooling/**'
      - 'package.json'
      - '.github/actions/**'
      - '.github/workflows/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'biome.jsonc'
      - 'eslint*'
      - 'bunfig.toml'
      - 'tsconfig.json'
      - 'turbo.json'
      - 'config'
      - 'scripts'
      - 'patches'

  workflow_dispatch:

# Add concurrency to cancel redundant runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    if: >-
      (github.event_name != 'pull_request' || github.event.pull_request.title != '[Release] Version packages') &&
      (github.event_name != 'push' || github.event.head_commit.message != 'Version Packages')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📥 Monorepo install
        uses: ./.github/actions/pnpm-install

      - name: 🔬 Lint
        run: pnpm lint

      - name: ♻️ Restore packages cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache
            ${{ github.workspace }}/**/tsconfig.tsbuildinfo
          key: packages-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: 🏗 Build
        run: pnpm build

      - name: 🕵️ Typecheck
        run: pnpm typecheck

      - name: 🧪 Test
        run: bun test

      # - name: 📥 Install Playwright dependencies
